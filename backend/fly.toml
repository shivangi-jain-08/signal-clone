app            = "signal-clone-api"   # rename to anything unique before first deploy
primary_region = "sin"                # Singapore — nearest to India

[build]

[env]
  DATABASE_URL             = "sqlite+aiosqlite:////data/signal.db"
  MEDIA_DIR                = "/data/media"
  SHOW_DOCS                = "true"
  LOG_LEVEL                = "INFO"
  ALGORITHM                = "HS256"
  ACCESS_TOKEN_EXPIRE_DAYS = "7"

[[mounts]]
  source      = "signal_data"
  destination = "/data"

[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "off"
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    timeout      = "5s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
